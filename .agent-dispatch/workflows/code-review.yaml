# Workflow: 代码审查 + 测试生成
name: code-review
description: "4-lens 并行审查 → 问题汇总 → 自动修复 → 测试生成"
version: "1.0"

triggers:
  - pattern: "审查代码"
  - pattern: "code review"
  - manual: "agent-dispatch test code-review"

phases:
  - name: parallel_review
    description: "4 个审查维度并行执行"
    type: parallel
    tasks:
      - id: correctness
        description: "逻辑正确性：边界条件、参数校验、空值处理"
        checks:
          - "API 端点是否校验 page>=1, limit<=100"
          - "uniqueness_score 是否在 1-10 范围"
          - "空数据库时 random 端点是否返回 404"
          - "TripCreate 必填字段是否与模型一致"
          - "分页 offset 计算是否正确"

      - id: security
        description: "安全性：注入防护、敏感信息、CORS"
        checks:
          - "所有查询使用 SQLAlchemy ORM 参数化 → 防 SQL 注入"
          - "React 默认转义 → 防 XSS"
          - "PEXELS_API_KEY 是否在代码中硬编码"
          - "CORS allow_origins 是否限制 localhost"
          - "react-markdown 是否需要 sanitize 插件"

      - id: performance
        description: "性能：查询优化、资源加载、bundle 大小"
        checks:
          - "列表查询是否一次获取所有数据再分页"
          - "图片是否使用 loading=\"lazy\""
          - "前端 bundle: gzip 后是否 < 150KB"
          - "是否有 React.lazy 代码分割"
          - "API 响应时间（本地 SQLite < 10ms）"

      - id: a11y_i18n
        description: "可访问性与国际化"
        checks:
          - "img 标签是否有 alt 属性"
          - "按钮是否有 aria-label"
          - "颜色对比度是否达标"
          - "所有中文文本是否硬编码（i18n 预留）"
          - "表单输入是否有 label 关联"

  - name: synthesize
    description: "汇总 4 个 lens 的发现，按严重程度排序"
    type: single
    output: review_report

  - name: auto_fix
    description: "对 warning 级别问题自动修复，critical 需人工确认"
    type: pipeline
    steps:
      - id: fix_alt_tags
        description: "自动补全缺失的 alt 属性"
      - id: fix_lazy_loading
        description: "添加 loading=\"lazy\" 到图片"
      - id: fix_aria_labels
        description: "补全按钮 aria-label"

output:
  format: json
  schema:
    summary:
      total: number
      critical: number
      warning: number
      info: number
    findings: array
    fixed: array
    test_suggestions: array
